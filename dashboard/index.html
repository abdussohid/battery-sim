<!DOCTYPE html>
<html>

<head>
    <title>Battery Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">

        <h1>Battery Passport</h1>

        <div class="item">
            <span>ID</span>
            <span id="batteryID">--</span>
        </div>

        <div class="item">
            <span>SOC</span>
            <span id="soc">--</span>
        </div>

        <div class="item">
            <span>Current</span>
            <span id="current">--</span>
        </div>

        <div class="item">
            <span>Voltage</span>
            <span id="voltage">--</span>
        </div>

        <div class="item">
            <span>Updated</span>
            <span id="updated">--</span>
        </div>

    </div>

    <script type="module" src="app.js"></script>

</body>

</html>
